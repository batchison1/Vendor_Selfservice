# Minimal nginx config to serve the built SPA with history-API fallback.
# TEMPLATE / scaffolding — adjust for your UCP ingress/TLS termination.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
